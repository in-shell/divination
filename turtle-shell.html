<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龟壳占卜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;600;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b09;--bg2:#1a1610;--bg3:#252017;--gold:#c9a96e;--gold2:#e8d5a3;
  --gold-dim:#7a6a42;--red:#b33a3a;--red2:#d45a5a;--text:#e8dcc8;--text-dim:#9a8e7a;
  --border:#3a3228;--shadow:rgba(0,0,0,0.6);
  --coin-gold:#d4a84b;--coin-gold2:#f0d078;--coin-dark:#8a6a2a;
  --shell-dark:#5c3d1e;--shell-mid:#8b5a2b;--shell-light:#b8864a;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.8;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(201,169,110,0.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(179,58,58,0.03) 0%,transparent 60%),
    radial-gradient(ellipse at 50% 50%,rgba(201,169,110,0.02) 0%,transparent 80%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a96e' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.container{max-width:900px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

/* Nav */
.nav{
  display:flex;justify-content:center;gap:30px;padding:20px 0;
  border-bottom:1px solid var(--border);
}
.nav a{
  color:var(--text-dim);text-decoration:none;font-size:0.9rem;
  letter-spacing:0.15em;transition:color 0.3s;
}
.nav a:hover{color:var(--gold)}
.nav a.active{color:var(--gold);position:relative}
.nav a.active::after{
  content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:20px;height:1px;background:var(--gold);
}

/* Header */
header{text-align:center;padding:50px 0 30px;position:relative}
header h1{
  font-family:'Ma Shan Zheng',cursive;font-size:clamp(2.5rem,8vw,4.5rem);
  color:var(--gold);letter-spacing:0.15em;margin-bottom:8px;
  text-shadow:0 0 40px rgba(201,169,110,0.2);
}
header .subtitle{
  font-size:clamp(0.85rem,2.5vw,1.1rem);color:var(--text-dim);
  font-weight:200;letter-spacing:0.3em;
}
header .divider{
  width:120px;height:1px;margin:20px auto;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}

/* Input Section */
.input-section{
  text-align:center;padding:20px 0 30px;
}
.question-input{
  width:100%;max-width:500px;padding:14px 20px;
  border:1px solid var(--border);border-radius:4px;
  background:rgba(26,22,16,0.6);color:var(--text);
  font-family:'Noto Serif SC',serif;font-size:0.95rem;
  letter-spacing:0.05em;outline:none;transition:all 0.3s;
  text-align:center;
}
.question-input:focus{
  border-color:var(--gold-dim);
  box-shadow:0 0 20px rgba(201,169,110,0.1);
}
.question-input::placeholder{color:var(--text-dim);opacity:0.5}

/* Start Button */
.start-section{text-align:center;padding:10px 0 30px}
.btn-start{
  display:inline-flex;align-items:center;gap:12px;
  padding:16px 48px;border:1px solid var(--gold-dim);
  background:linear-gradient(135deg,rgba(201,169,110,0.1),rgba(201,169,110,0.02));
  color:var(--gold);font-family:'Noto Serif SC',serif;font-size:1.1rem;
  letter-spacing:0.2em;cursor:pointer;border-radius:2px;
  transition:all 0.4s ease;position:relative;overflow:hidden;
}
.btn-start::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,0.15),transparent);
  opacity:0;transition:opacity 0.4s;
}
.btn-start:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,169,110,0.15)}
.btn-start:hover::before{opacity:1}
.btn-start:active{transform:translateY(0)}
.btn-start:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Progress */
.progress-bar{
  display:flex;justify-content:center;gap:12px;padding:15px 0;
  opacity:0;transition:opacity 0.5s;
}
.progress-bar.active{opacity:1}
.progress-dot{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;color:var(--text-dim);
  transition:all 0.4s;position:relative;
}
.progress-dot.active{
  border-color:var(--gold);color:var(--gold);
  box-shadow:0 0 15px rgba(201,169,110,0.3);
  background:rgba(201,169,110,0.05);
}
.progress-dot.done{
  background:var(--gold-dim);border-color:var(--gold-dim);color:var(--bg);
}
.progress-label{
  text-align:center;color:var(--text-dim);font-size:0.9rem;
  padding:8px 0;min-height:32px;letter-spacing:0.1em;
}

/* Turtle Shell Area */
.shell-area{
  min-height:380px;border:1px solid var(--border);border-radius:4px;
  background:linear-gradient(180deg,rgba(26,22,16,0.8),rgba(13,11,9,0.9));
  margin:20px 0;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;
}
.shell-area::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(201,169,110,0.04),transparent 70%);
}

/* Turtle Shell */
.turtle-shell{
  width:220px;height:180px;position:relative;
  margin-bottom:20px;transition:transform 0.1s;
}
.turtle-shell.shaking{
  animation:shellShake 0.15s ease-in-out infinite;
}
@keyframes shellShake{
  0%,100%{transform:translateX(0) rotate(0)}
  25%{transform:translateX(-8px) rotate(-3deg)}
  75%{transform:translateX(8px) rotate(3deg)}
}

.shell-body{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 50% 40%,var(--shell-light) 0%,var(--shell-mid) 40%,var(--shell-dark) 100%);
  border-radius:50% 50% 45% 45% / 55% 55% 45% 45%;
  box-shadow:
    inset 0 -10px 30px rgba(0,0,0,0.4),
    inset 0 5px 15px rgba(255,220,150,0.2),
    0 10px 30px rgba(0,0,0,0.5);
}
.shell-body::before{
  content:'';position:absolute;inset:15px;
  border-radius:50% 50% 45% 45% / 55% 55% 45% 45%;
  border:1px solid rgba(0,0,0,0.2);
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.2);
}

/* Shell pattern - hexagons */
.shell-pattern{
  position:absolute;inset:25px 30px;
  display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);gap:3px;
}
.hex-cell{
  background:rgba(92,61,30,0.6);
  clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  border:1px solid rgba(0,0,0,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;color:rgba(255,220,150,0.3);
  font-weight:600;
}
.hex-cell.center{
  background:rgba(139,90,43,0.8);
}

/* Coins */
.coins-container{
  display:flex;gap:24px;justify-content:center;align-items:center;
  min-height:100px;margin:10px 0;
  perspective:800px;
}
.coin{
  width:64px;height:64px;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.1s;
}
.coin.flipping{
  animation:coinFlip 0.6s ease-in-out;
}
@keyframes coinFlip{
  0%{transform:rotateY(0) translateY(0)}
  50%{transform:rotateY(540deg) translateY(-30px)}
  100%{transform:rotateY(1080deg) translateY(0)}
}

.coin-face{
  position:absolute;inset:0;border-radius:50%;
  backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;
}
.coin-front{
  background:
    radial-gradient(circle at 30% 30%,var(--coin-gold2),var(--coin-gold) 50%,var(--coin-dark) 100%);
  color:#5a3a10;
  box-shadow:
    inset 0 2px 6px rgba(255,255,200,0.4),
    inset 0 -3px 8px rgba(0,0,0,0.3),
    0 4px 12px rgba(0,0,0,0.4);
  border:2px solid var(--coin-dark);
}
.coin-front::before{
  content:'';position:absolute;inset:6px;
  border-radius:50%;border:1px solid rgba(90,58,16,0.3);
}
.coin-back{
  background:
    radial-gradient(circle at 30% 30%,var(--coin-gold2),var(--coin-gold) 50%,var(--coin-dark) 100%);
  color:#5a3a10;
  transform:rotateY(180deg);
  box-shadow:
    inset 0 2px 6px rgba(255,255,200,0.4),
    inset 0 -3px 8px rgba(0,0,0,0.3),
    0 4px 12px rgba(0,0,0,0.4);
  border:2px solid var(--coin-dark);
}
.coin-back::before{
  content:'';position:absolute;inset:6px;
  border-radius:50%;border:1px solid rgba(90,58,16,0.3);
}
.coin-back .coin-symbol{
  font-size:1rem;font-family:'Ma Shan Zheng',cursive;
}
.coin-front .coin-symbol{
  font-family:'Ma Shan Zheng',cursive;
}

.coin[data-side="heads"]{transform:rotateY(0)}
.coin[data-side="tails"]{transform:rotateY(180deg)}

/* Coin result info */
.coin-result{
  text-align:center;padding:15px 0;min-height:80px;
}
.coin-result .yao-title{
  font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.3rem,4vw,1.8rem);
  color:var(--gold);margin-bottom:6px;
}
.coin-result .yao-desc{color:var(--text-dim);font-size:0.9rem;letter-spacing:0.05em}
.coin-result .yao-detail{
  color:var(--gold2);font-size:0.95rem;margin-top:6px;
  font-weight:600;letter-spacing:0.05em;
}

/* Coins legend */
.coins-legend{
  display:flex;gap:30px;justify-content:center;padding:10px 0;
  font-size:0.8rem;color:var(--text-dim);
}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{
  width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,var(--coin-gold2),var(--coin-gold) 50%,var(--coin-dark) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;color:#5a3a10;font-weight:700;
}

/* Results Section */
.results-section{
  padding:40px 0;opacity:0;transform:translateY(20px);
  transition:all 0.8s ease;
}
.results-section.visible{opacity:1;transform:translateY(0)}

.hexagram-display{text-align:center;padding:30px 0}
.hexagram-title{
  font-family:'Ma Shan Zheng',cursive;font-size:clamp(1.8rem,5vw,2.5rem);
  color:var(--gold);margin-bottom:4px;
}
.hexagram-subtitle{color:var(--text-dim);font-size:0.9rem;margin-bottom:24px;letter-spacing:0.15em}

.yao-lines{display:flex;flex-direction:column;align-items:center;gap:6px}
.yao-line{
  display:flex;align-items:center;gap:12px;padding:4px 0;
  opacity:0;transform:translateX(-20px);
  transition:all 0.5s ease;
}
.yao-line.visible{opacity:1;transform:translateX(0)}
.yao-line .yao-num{
  font-size:0.75rem;color:var(--text-dim);width:40px;text-align:right;
}
.yao-line .yao-symbol{
  display:flex;gap:8px;min-width:120px;justify-content:center;
}
.yao-line .yao-symbol .bar{
  height:6px;border-radius:3px;background:var(--gold);
  transition:all 0.3s;
}
.yao-line .yao-symbol .bar.yang{width:60px}
.yao-line .yao-symbol .bar.yin{width:24px}
.yao-line .yao-type{
  font-size:0.8rem;width:50px;
}
.yao-line .yao-type.laoyin{color:var(--red2)}
.yao-line .yao-type.laoyang{color:var(--gold2)}
.yao-line .yao-type.shaoyin,.yao-line .yao-type.shaoyang{color:var(--text-dim)}
.yao-line.changing .yao-symbol .bar{animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* Interpretation */
.interpretation{
  margin-top:30px;padding:24px;border:1px solid var(--border);border-radius:4px;
  background:linear-gradient(135deg,rgba(26,22,16,0.8),rgba(13,11,9,0.9));
}
.interp-title{
  font-family:'Ma Shan Zheng',cursive;font-size:1.3rem;
  color:var(--gold);margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.interp-body{color:var(--text);font-size:0.95rem;line-height:2;letter-spacing:0.03em}
.interp-body .highlight{color:var(--gold2);font-weight:600}
.interp-body .section-title{color:var(--gold);font-weight:600;margin-top:16px;font-size:1rem}

/* Changed Hexagram */
.changed-hex{
  margin-top:24px;padding:20px;border:1px dashed var(--border);border-radius:4px;
  text-align:center;
}
.changed-hex .ch-title{
  font-family:'Ma Shan Zheng',cursive;font-size:1.2rem;
  color:var(--gold-dim);margin-bottom:8px;
}
.changed-hex .ch-name{font-size:1.1rem;color:var(--text);margin-bottom:4px}
.changed-hex .ch-desc{font-size:0.85rem;color:var(--text-dim)}

/* Mutual Hexagram */
.mutual-hex{margin-top:16px;padding:20px;border:1px dashed var(--border);border-radius:4px;text-align:center}
.mutual-hex .mu-title{font-family:'Ma Shan Zheng',cursive;font-size:1.2rem;color:var(--gold-dim);margin-bottom:8px}
.mutual-hex .mu-name{font-size:1.1rem;color:var(--text);margin-bottom:4px}
.mutual-hex .mu-desc{font-size:0.85rem;color:var(--text-dim)}

/* Yao Text */
.yao-text-section{margin-top:24px}
.yao-text-item{
  padding:10px 0;border-bottom:1px solid rgba(58,50,40,0.5);
  display:flex;gap:12px;
}
.yao-text-item:last-child{border-bottom:none}
.yao-text-item .yt-num{color:var(--gold-dim);font-size:0.85rem;min-width:50px}
.yao-text-item .yt-content{color:var(--text);font-size:0.9rem}
.yao-text-item.changing .yt-content{color:var(--gold2)}

/* History */
.history-section{padding:20px 0 60px}
.history-title{
  font-family:'Ma Shan Zheng',cursive;font-size:1.2rem;
  color:var(--gold-dim);margin-bottom:12px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.history-title::after{content:'▾';font-size:0.8rem;transition:transform 0.3s}
.history-title.open::after{transform:rotate(180deg)}
.history-list{display:none;padding:10px 0}
.history-list.open{display:block}
.history-item{
  padding:10px 16px;border:1px solid var(--border);border-radius:4px;
  margin-bottom:8px;background:rgba(26,22,16,0.4);cursor:pointer;
  transition:all 0.3s;
}
.history-item:hover{border-color:var(--gold-dim);background:rgba(26,22,16,0.7)}
.history-item .hi-name{color:var(--gold);font-size:0.95rem}
.history-item .hi-time{color:var(--text-dim);font-size:0.75rem;margin-top:2px}

/* Responsive */
@media(max-width:600px){
  header{padding:30px 0 20px}
  .shell-area{padding:20px 12px;min-height:320px}
  .turtle-shell{width:160px;height:130px}
  .coin{width:48px;height:48px}
  .coin-face{font-size:1rem}
  .coins-container{gap:16px}
  .yao-line .yao-symbol .bar.yang{width:44px}
  .yao-line .yao-symbol .bar.yin{width:18px}
  .interpretation{padding:16px}
  .btn-start{padding:14px 32px;font-size:1rem}
  .coins-legend{gap:16px;font-size:0.75rem}
}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.fade-in-up{animation:fadeInUp 0.6s ease forwards}
.fade-in{animation:fadeIn 0.5s ease forwards}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--bg3);color:var(--gold);padding:12px 24px;border:1px solid var(--gold-dim);
  border-radius:4px;font-size:0.9rem;z-index:100;transition:transform 0.4s ease;
  letter-spacing:0.1em;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Share Button */
.share-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border:1px solid var(--gold-dim);
  background:linear-gradient(135deg,rgba(201,169,110,0.08),rgba(201,169,110,0.02));
  color:var(--gold);font-family:'Noto Serif SC',serif;font-size:0.9rem;
  letter-spacing:0.15em;cursor:pointer;border-radius:2px;
  transition:all 0.3s ease;margin-top:20px;
}
.share-btn:hover{border-color:var(--gold);background:rgba(201,169,110,0.12);transform:translateY(-1px)}
.share-btn:active{transform:translateY(0)}
.share-btn svg{width:16px;height:16px;opacity:0.8}
.share-btn.loading{opacity:0.5;pointer-events:none}

.share-capture{
  background:linear-gradient(180deg,#0d0b09 0%,#1a1610 100%) !important;
  padding-top:30px !important;
}
.share-capture .share-header{
  text-align:center;margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.share-capture .share-header h2{
  font-family:'Ma Shan Zheng',cursive;font-size:1.6rem;color:var(--gold);
  letter-spacing:0.15em;margin-bottom:4px;
}
.share-capture .share-header p{color:var(--text-dim);font-size:0.8rem;letter-spacing:0.2em}

/* Image Modal */
.image-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn 0.3s ease;
}
.image-modal-content{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  max-width:100%;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.image-modal-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border);
  color:var(--gold);font-size:0.9rem;letter-spacing:0.1em;
}
.image-modal-close{
  background:none;border:none;color:var(--text-dim);font-size:1.5rem;
  cursor:pointer;line-height:1;padding:0 4px;
}
.image-modal-close:hover{color:var(--gold)}
.image-modal-img{
  max-width:100%;max-height:calc(90vh - 50px);display:block;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <nav class="nav">
    <a href="index.html">大衍算卦</a>
    <a href="turtle-shell.html" class="active">龟壳占卜</a>
  </nav>

  <header>
    <h1>龟壳占卜</h1>
    <p class="subtitle">古龟卜法 以钱代蓍</p>
    <div class="divider"></div>
  </header>

  <div class="input-section">
    <input type="text" class="question-input" id="questionInput" 
      placeholder="请输入您想占卜的问题..." maxlength="50">
  </div>

  <div class="start-section">
    <button class="btn-start" id="btnStart" onclick="startDivination()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
      </svg>
      起卦
    </button>
  </div>

  <div class="progress-bar" id="progressBar"></div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="shell-area" id="shellArea">
    <div class="coin-result" id="coinResult">

// ============ Core Algorithm ============
function secureRandomInt(min, max) {
  const range = max - min + 1;
  const buf = new Uint32Array(2);
  crypto.getRandomValues(buf);
  const t = (Date.now() & 0xFFFFFFFF) >>> 0;
  const v = (buf[0] ^ t ^ (buf[1] >>> 0)) >>> 0;
  return min + (v % range);
}

// 三枚铜钱起一爻
// 正面(字)=3数(阳)，反面(背)=2数(阴)
// 三枚总和：6=老阴，7=少阳，8=少阴，9=老阳
function tossCoins() {
  const coins = [];
  let total = 0;
  for (let i = 0; i < 3; i++) {
    const isHeads = secureRandomInt(0, 1) === 1;
    const value = isHeads ? 3 : 2;
    coins.push({ isHeads, value });
    total += value;
  }
  
  let yaoType, yaoValue, isChanging;
  switch(total) {
    case 6:
      yaoType = '老阴'; yaoValue = 6; isChanging = true; break;
    case 7:
      yaoType = '少阳'; yaoValue = 7; isChanging = false; break;
    case 8:
      yaoType = '少阴'; yaoValue = 8; isChanging = false; break;
    case 9:
      yaoType = '老阳'; yaoValue = 9; isChanging = true; break;
  }
  
  return { coins, total, yaoType, yaoValue, isChanging };
}

// ============ State ============
let isRunning = false;
let history = JSON.parse(localStorage.getItem('turtle_history') || '[]');

// ============ UI Helpers ============
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setCoinResult(title, desc, detail) {
  $('coinResult').innerHTML = `
    <div class="yao-title">${title}</div>
    <div class="yao-desc">${desc}</div>
    ${detail ? `<div class="yao-detail">${detail}</div>` : ''}
  `;
}

function setCoinSide(coinEl, isHeads) {
  coinEl.dataset.side = isHeads ? 'heads' : 'tails';
}

function flipCoin(coinEl, isHeads) {
  return new Promise(resolve => {
    coinEl.classList.add('flipping');
    setTimeout(() => {
      setCoinSide(coinEl, isHeads);
    }, 300);
    setTimeout(() => {
      coinEl.classList.remove('flipping');
      resolve();
    }, 600);
  });
}

async function shakeShell(duration) {
  const shell = $('turtleShell');
  shell.classList.add('shaking');
  await sleep(duration);
  shell.classList.remove('shaking');
}

// ============ Main Flow ============
async function startDivination() {
  if (isRunning) return;
  isRunning = true;
  $('btnStart').disabled = true;
  $('resultsSection').classList.remove('visible');

  const question = $('questionInput').value.trim();
  if (!question) {
    showToast('请先输入占卜的问题');
    $('btnStart').disabled = false;
    isRunning = false;
    return;
  }

  // 预计算六爻结果
  const yaoResults = [];
  for (let i = 0; i < 6; i++) {
    yaoResults.push(tossCoins());
  }

  console.log('========== 龟壳占卜卦序 ==========');
  yaoResults.forEach((r, idx) => {
    console.log(`第 ${idx + 1} 爻: ${r.coins.map(c => c.isHeads ? '字' : '背').join(' ')} = ${r.total}数 → ${r.yaoType}`);
  });
  console.log('==================================');

  // 进度条
  const progressBar = $('progressBar');
  const progressLabel = $('progressLabel');
  progressBar.innerHTML = '';
  progressBar.classList.add('active');
  const yaoNames = ['初','二','三','四','五','上'];
  for (let i = 0; i < 6; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.textContent = yaoNames[i];
    progressBar.appendChild(dot);
  }

  const lines = [];

  // 逐爻动画
  for (let i = 0; i < 6; i++) {
    const dots = progressBar.querySelectorAll('.progress-dot');
    dots[i].classList.add('active');
    progressLabel.textContent = `正在求第${yaoNames[i]}爻...`;

    const result = yaoResults[i];
    
    // 摇龟壳
    setCoinResult(
      `第${yaoNames[i]}爻`,
      '摇动龟壳...',
      ''
    );
    await shakeShell(800);

    // 铜钱翻转
    const coinEls = [$('coin1'), $('coin2'), $('coin3')];
    for (let j = 0; j < 3; j++) {
      await flipCoin(coinEls[j], result.coins[j].isHeads);
      await sleep(100);
    }

    // 显示结果
    const coinDescs = result.coins.map(c => c.isHeads ? '字' : '背').join(' · ');
    setCoinResult(
      `第${yaoNames[i]}爻 · 结果`,
      `${coinDescs}`,
      `${result.total}数 → ${result.yaoType}${result.isChanging ? '（变爻）' : ''}`
    );

    lines.push({
      value: result.yaoValue,
      info: {
        type: result.yaoType,
        changing: result.isChanging,
        cls: result.yaoType === '老阴' ? 'laoyin' : 
             result.yaoType === '老阳' ? 'laoyang' :
             result.yaoType === '少阴' ? 'shaoyin' : 'shaoyang'
      }
    });

    await sleep(800);
    dots[i].classList.remove('active');
    dots[i].classList.add('done');
  }

  progressLabel.textContent = '卦象已成';
  progressBar.classList.remove('active');

  const binary = lines.map(l => (l.value === 7 || l.value === 9) ? '1' : '0').join('');
  showResults(lines, binary, question);
  saveHistory(lines, binary, question);

  isRunning = false;
  $('btnStart').disabled = false;
}

function showResults(lines, binary, question) {
  const hex = HEXAGRAMS[binary] || {name:'未知', full:'未知卦', desc:'数据缺失', detail:'未找到对应卦象信息。'};
  const display = $('hexDisplay');

  const changedBinary = lines.map(l => {
    if (l.value === 6) return '1';
    if (l.value === 9) return '0';
    return (l.value === 7) ? '1' : '0';
  }).join('');
  const changedHex = HEXAGRAMS[changedBinary];

  const mutualLower = binary.substring(1, 4);
  const mutualUpper = binary.substring(2, 5);
  const mutualBinary = mutualLower + mutualUpper;
  const mutualHex = HEXAGRAMS[mutualBinary];

  const changingLines = lines.map((l, i) => l.info.changing ? (i + 1) : 0).filter(v => v > 0);

  let yaoLinesHTML = '<div class="yao-lines">';
  for (let i = 5; i >= 0; i--) {
    const l = lines[i];
    const isYang = l.value === 7 || l.value === 9;
    const symbolHTML = isYang
      ? '<div class="bar yang"></div>'
      : '<div class="bar yin"></div><div class="bar yin"></div>';
    const changingClass = l.info.changing ? ' changing' : '';
    yaoLinesHTML += `
      <div class="yao-line${changingClass}" style="transition-delay:${(5-i)*0.15}s">
        <span class="yao-num">${['初','二','三','四','五','上'][i]}爻</span>
        <div class="yao-symbol">${symbolHTML}</div>
        <span class="yao-type ${l.info.cls}">${l.info.type}</span>
      </div>`;
  }
  yaoLinesHTML += '</div>';

  let interpHTML = `<div class="interp-title">${hex.full}</div>`;
  interpHTML += `<div class="interp-body">`;
  if (question) {
    interpHTML += `<p class="section-title">所问之事</p>`;
    interpHTML += `<p>${question}</p>`;
  }
  interpHTML += `<p class="section-title">卦辞</p>`;
  interpHTML += `<p>${hex.desc}</p>`;
  interpHTML += `<p class="section-title">释义</p>`;
  interpHTML += `<p>${hex.detail}</p>`;

  if (changingLines.length > 0) {
    interpHTML += `<p class="section-title">变爻：第${changingLines.join('、')}爻</p>`;
    interpHTML += `<p>本卦有${changingLines.length}个变爻，需参考变卦。变爻指示事物变化的方面。</p>`;
  } else {
    interpHTML += `<p class="section-title">断卦</p>`;
    interpHTML += `<p>本卦无变爻，以本卦卦辞断之。</p>`;
  }
  interpHTML += `</div>`;

  if (changedHex && changingLines.length > 0) {
    interpHTML += `
      <div class="changed-hex">
        <div class="ch-title">变卦</div>
        <div class="ch-name">${changedHex.full}</div>
        <div class="ch-desc">${changedHex.desc}</div>
      </div>`;
  }

  if (mutualHex) {
    interpHTML += `
      <div class="mutual-hex">
        <div class="mu-title">互卦</div>
        <div class="mu-name">${mutualHex.full}</div>
        <div class="mu-desc">${mutualHex.desc}</div>
      </div>`;
  }

  interpHTML += `<div class="yao-text-section"><div class="interp-title">六爻详析</div>`;
  const yaoTexts = YAO_TEXTS[hex.name] || ['','','','','',''];
  for (let i = 0; i < 6; i++) {
    const l = lines[i];
    const pos = ['初','二','三','四','五','上'][i];
    const changingClass = l.info.changing ? ' changing' : '';
    interpHTML += `
      <div class="yao-text-item${changingClass}">
        <span class="yt-num">${pos}爻 ${l.info.type}</span>
        <span class="yt-content">${yaoTexts[i]}</span>
      </div>`;
  }
  interpHTML += `</div>`;

  display.innerHTML = `
    <div class="hexagram-title">${hex.name}</div>
    <div class="hexagram-subtitle">${hex.full}</div>
    ${yaoLinesHTML}
  `;

  $('interpSection').innerHTML = interpHTML;

  setTimeout(() => {
    $('resultsSection').classList.add('visible');
    document.querySelectorAll('.yao-line').forEach(el => el.classList.add('visible'));
  }, 100);

  setTimeout(() => {
    $('resultsSection').scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 600);

  $('shareBtnWrap').innerHTML = `
    <button class="share-btn" onclick="shareAsImage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      分享卦象
    </button>`;
}

function saveHistory(lines, binary, question) {
  const hex = HEXAGRAMS[binary];
  if (!hex) return;
  const record = {
    name: hex.full,
    question: question || '',
    lines: lines.map(l => l.value),
    binary,
    time: new Date().toLocaleString('zh-CN')
  };
  history.unshift(record);
  if (history.length > 20) history.pop();
  localStorage.setItem('turtle_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    $('historySection').style.display = 'none';
    return;
  }
  $('historySection').style.display = 'block';
  let html = '';
  history.forEach((h, i) => {
    html += `<div class="history-item" onclick="loadHistory(${i})">
      <div class="hi-name">${h.name}${h.question ? ' - ' + h.question : ''}</div>
      <div class="hi-time">${h.time}</div>
    </div>`;
  });
  $('historyList').innerHTML = html;
}

function loadHistory(idx) {
  const h = history[idx];
  if (!h) return;
  const lines = h.lines.map(v => {
    const mapping = {
      6: {type: '老阴', cls: 'laoyin', changing: true},
      7: {type: '少阳', cls: 'shaoyang', changing: false},
      8: {type: '少阴', cls: 'shaoyin', changing: false},
      9: {type: '老阳', cls: 'laoyang', changing: true}
    };
    return {value: v, info: mapping[v]};
  });
  $('resultsSection').classList.remove('visible');
  setTimeout(() => showResults(lines, h.binary, h.question), 100);
}

function toggleHistory() {
  $('historyToggle').classList.toggle('open');
  $('historyList').classList.toggle('open');
}

// ============ Share as Image ============
async function shareAsImage() {
  const btn = document.querySelector('.share-btn');
  if (!btn || btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  btn.textContent = '生成中...';

  let canvas;
  let headerDiv;

  try {
    const hexEl = $('hexDisplay');
    const hexName = hexEl.querySelector('.hexagram-title')?.textContent || '卦象';
    const now = new Date();
    const timeStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const fileName = `龟壳占卜_${hexName}_${timeStr.replace(/[\s:]/g, '')}.png`;

    headerDiv = document.createElement('div');
    headerDiv.className = 'share-header';
    headerDiv.innerHTML = `<h2>龟壳占卜</h2><p>${timeStr}</p>`;
    $('resultsSection').prepend(headerDiv);
    $('resultsSection').classList.add('share-capture');
    $('shareBtnWrap').style.display = 'none';

    $('resultsSection').scrollIntoView({behavior: 'instant', block: 'start'});
    await new Promise(r => setTimeout(r, 400));

    canvas = await html2canvas($('resultsSection'), {
      backgroundColor: '#0d0b09',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: 600
    });

    $('resultsSection').removeChild(headerDiv);
    headerDiv = null;
    $('resultsSection').classList.remove('share-capture');
    $('shareBtnWrap').style.display = '';

    if (navigator.share && canvas.toBlob) {
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], fileName, { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: fileName });
          showToast('分享成功');
          return;
        }
      } catch (shareErr) {}
    }

    let downloaded = false;
    if (canvas.toBlob && URL.createObjectURL) {
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        downloaded = true;
      } catch (e) {}
    }

    if (!downloaded) {
      try {
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        downloaded = true;
      } catch (e) {}
    }

    if (downloaded) {
      showToast('卦象图片已保存');
    } else {
      showImageModal(canvas, fileName);
      showToast('请长按/右键图片保存');
    }
  } catch (e) {
    console.error('Share failed:', e);
    showToast('生成失败，请重试');
    if (headerDiv && headerDiv.parentNode) {
      $('resultsSection').removeChild(headerDiv);
    }
    $('resultsSection').classList.remove('share-capture');
    $('shareBtnWrap').style.display = '';
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:16px;height:16px;opacity:0.8">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      分享卦象`;
  }
}

function showImageModal(canvas, fileName) {
  const modal = document.createElement('div');
  modal.className = 'image-modal';
  modal.innerHTML = `
    <div class="image-modal-content">
      <div class="image-modal-header">
        <span>长按/右键图片保存</span>
        <button class="image-modal-close">×</button>
      </div>
      <img class="image-modal-img" alt="${fileName}">
    </div>`;
  modal.querySelector('.image-modal-img').src = canvas.toDataURL('image/png');
  modal.querySelector('.image-modal-close').onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
}

// Init
renderHistory();
</script>
